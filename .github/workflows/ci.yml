name: UI Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master, develop ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Pull browser image
        run: |
          docker pull selenoid/vnc_chrome:128.0

      - name: Download Selenoid binary
        run: |
          curl -L -o selenoid https://github.com/aerokube/selenoid/releases/latest/download/selenoid_linux_amd64
          chmod +x selenoid

      - name: Start Selenoid
        run: |
          ./selenoid \
            -conf ./browsers.json \
            -listen :4444 \
            -timeout 5m \
            -service-startup-timeout 2m \
            -session-attempt-timeout 2m \
            -retry-count 2 \
            -capture-driver-logs > selenoid.log 2>&1 &
          sleep 10

      - name: Check Selenoid status
        run: |
          curl http://localhost:4444/status

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        env:
          SELENIUM_REMOTE_URL: http://localhost:4444/wd/hub
        run: |
          pytest tests -v --alluredir=allure-results

      - name: Upload allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results/

      - name: Upload Selenoid log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selenoid-log
          path: selenoid.log